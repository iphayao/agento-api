spring:
  application:
    name: agento-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agento}
    username: ${SPRING_DATASOURCE_USERNAME:agento}
    password: ${SPRING_DATASOURCE_PASSWORD:agento}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

agento:
  agent:
    base-url: ${AGENTO_AGENT_BASE_URL:http://localhost:8081}
    timeout-ms: ${AGENTO_AGENT_TIMEOUT_MS:30000}

logging:
  level:
    com.bnpaper.agento: INFO
